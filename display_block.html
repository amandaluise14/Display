        <span class="yo pink"> 1</span>
        <span class="yo pink"> 2</span>

        <span class="yo pink"> 4</span>

    </div>

    <div>

    </div>

    <div class="inline-flex">
        <div class="yo">1</div>
        <div class="yo">2</div>
        <div class="yo">3</div>

    </div>

        <div>1</div>
