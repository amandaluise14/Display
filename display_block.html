<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>

</head>
<body>

    <h2>Display block</h2>
    <div class="block">
        <span> 1</span>
    </div>

    <h2>Display inline</h2>
    <div class="inline">
        <span class="yo pink"> 1</span>
        <span class="yo pink"> 2</span>
        <span class="yo pink"> 3</span>
        <span class="yo pink"> 4</span>
       

    </div>
    
    <h2>Display Inline block</h2>
    <div class="inline-block">
        <div class="elemento">1</div>
        <div class="elemento">2</div>
        <div class="elemento">3</div>


    </div>

    <div>
    <h2>Display Flex</h2>
    <section class="flex">
        <div class="yo blue">1</div>
        <div class="yo blue">2</div>
        <div class="yo blue">3</div>
        <div class="yo blue">4</div>
        <div class="yo blue">5</div>
        <div class="yo blue">6</div>
        <div class="yo blue">7</div>
    </section>
    </div>

    <div>
    <h1>Display grid</h1>
    <section class="grid">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </section>
    </div>

    <div>
        <h1>Display flow-root</h1>
    <section class="flow_root">
        <div class="item2">1</div>
        <div class="item2">2</div>
        <div class="item2">3</div>
        <div class="item2">4</div>
    </section>
    </div>

    <div>
        <h1>Display block flow</h1>
        <section class="block_flow">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </section>
    </div>
    
    <h2>Display inline-flex</h2>
    <div class="inline-flex">
        <div class="yo">1</div>
        <div class="yo">2</div>
        <div class="yo">3</div>

    </div>


    <h2>Display Inline-grid</h2>
    <div class="inline-grid">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>


    </div>
</body>
</html>
